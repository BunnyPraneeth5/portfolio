<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | Karu Praneeth Kumar</title>
    <link rel="icon" type="image/png" href="assets/images/favicon.png">
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700&family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="https://unpkg.com/aos@next/dist/aos.css" />
    <link rel="stylesheet" href="styles.css">
</head>
<body class="bg-gray-900 text-white font-['Space_Grotesk']">
    <!-- Navigation -->
    <nav class="fixed top-0 left-0 right-0 z-50 bg-gray-900/50 backdrop-blur-md border-b border-gray-700/30">
        <div class="container mx-auto px-4">
            <div class="flex justify-between items-center h-16">
                <a href="index.html" class="text-xl font-['Orbitron'] bg-gradient-to-r from-blue-400 to-purple-600 bg-clip-text text-transparent">KP</a>
                <div class="hidden md:flex space-x-8">
                    <a href="about.html" class="nav-link">About</a>
                    <a href="skills.html" class="nav-link">Skills</a>
                    <a href="projects.html" class="nav-link">Projects</a>
                    <a href="blog.html" class="nav-link">Blog</a>
                    <a href="contact.html" class="nav-link active">Contact</a>
                </div>
                <div class="flex items-center space-x-4">
                    <button id="darkModeToggle" class="p-2 rounded-full bg-gray-800 hover:bg-gray-700 transition-colors">
                        <i class="fas fa-moon"></i>
                    </button>
                    <button id="mobileMenuToggle" class="md:hidden p-2 rounded-full bg-gray-800 hover:bg-gray-700 transition-colors">
                        <i class="fas fa-bars"></i>
                    </button>
                </div>
            </div>
        </div>
    </nav>

    <!-- Mobile Menu -->
    <div id="mobileMenu" class="mobile-menu md:hidden">
        <div class="p-4">
            <a href="about.html" class="block py-2 text-gray-300 hover:text-white">About</a>
            <a href="skills.html" class="block py-2 text-gray-300 hover:text-white">Skills</a>
            <a href="projects.html" class="block py-2 text-gray-300 hover:text-white">Projects</a>
            <a href="blog.html" class="block py-2 text-gray-300 hover:text-white">Blog</a>
            <a href="contact.html" class="block py-2 text-gray-300 hover:text-white active">Contact</a>
        </div>
    </div>

    <!-- Contact Content -->
    <main class="pt-24 pb-12">
        <div class="container mx-auto px-4">
            <!-- Header -->
            <div class="text-center mb-12" data-aos="fade-up">
                <h1 class="text-4xl md:text-5xl font-['Orbitron'] font-bold mb-4">
                    <span class="text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-purple-600">
                        Get in Touch
                    </span>
                </h1>
                <p class="text-xl text-gray-300">Let's discuss your next project</p>
            </div>

            <div class="max-w-4xl mx-auto">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                    <!-- Contact Form -->
                    <div class="glass-card p-6" data-aos="fade-up" data-aos-delay="100">
                        <form id="contactForm" action="https://formspree.io/f/mdkyarae" method="POST" class="space-y-6">
                            <div>
                                <label for="name" class="block text-sm font-medium mb-2">Name</label>
                                <input type="text" id="name" name="name" required
                                    class="w-full px-4 py-2 bg-gray-800 border border-gray-700 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent">
                            </div>
                            <div>
                                <label for="email" class="block text-sm font-medium mb-2">Email</label>
                                <input type="email" id="email" name="email" required
                                    class="w-full px-4 py-2 bg-gray-800 border border-gray-700 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent">
                            </div>
                            <div>
                                <label for="subject" class="block text-sm font-medium mb-2">Subject</label>
                                <input type="text" id="subject" name="subject" required
                                    class="w-full px-4 py-2 bg-gray-800 border border-gray-700 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent">
                            </div>
                            <div>
                                <label for="message" class="block text-sm font-medium mb-2">Message</label>
                                <textarea id="message" name="message" rows="4" required
                                    class="w-full px-4 py-2 bg-gray-800 border border-gray-700 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent"></textarea>
                            </div>
                            <button type="submit" id="submitBtn"
                                class="w-full px-6 py-3 bg-gradient-to-r from-blue-500 to-purple-600 rounded-lg hover:opacity-90 transition-opacity">
                                <i class="fas fa-paper-plane mr-2"></i><span id="btnText">Send Message</span>
                            </button>
                        </form>
                    </div>

                    <!-- Contact Information -->
                    <div class="space-y-8">
                        <!-- Contact Details -->
                        <div class="glass-card p-6" data-aos="fade-up" data-aos-delay="200">
                            <h2 class="text-2xl font-['Orbitron'] mb-4">Contact Information</h2>
                            <div class="space-y-4">
                                <div class="flex items-center">
                                    <i class="fas fa-envelope text-blue-400 w-8"></i>
                                    <a href="mailto:karupraneethkumar@gmail.com" class="text-gray-300 hover:text-white">
                                        karu.praneeth@gmail.com
                                    </a>
                                </div>
                                <div class="flex items-center">
                                    <i class="fas fa-map-marker-alt text-purple-400 w-8"></i>
                                    <span class="text-gray-300">Andhra Pradesh, India</span>
                                </div>
                            </div>
                        </div>

                        <!-- Social Links -->
                        <div class="glass-card p-6" data-aos="fade-up" data-aos-delay="300">
                            <h2 class="text-2xl font-['Orbitron'] mb-4">Connect With Me</h2>
                            <div class="grid grid-cols-2 gap-4">
                                <a href="https://github.com/BunnyPraneeth5" target="_blank"
                                    class="flex items-center p-3 bg-gray-800 rounded-lg hover:bg-gray-700 transition-colors">
                                    <i class="fab fa-github text-xl mr-2"></i>
                                    <span>GitHub</span>
                                </a>
                                <a href="https://linkedin.com/in/karu-praneeth-kumar" target="_blank"
                                    class="flex items-center p-3 bg-gray-800 rounded-lg hover:bg-gray-700 transition-colors">
                                    <i class="fab fa-linkedin text-xl mr-2"></i>
                                    <span>LinkedIn</span>
                                </a>
                                <a href="https://www.kaggle.com/bunnypraneeth5" target="_blank"
                                    class="flex items-center p-3 bg-gray-800 rounded-lg hover:bg-gray-700 transition-colors">
                                    <i class="fab fa-kaggle text-xl mr-2"></i>
                                    <span>Kaggle</span>
                                </a>
                                <a href="https://hackerrank.com/profile/karu_praneeth" target="_blank"
                                    class="flex items-center p-3 bg-gray-800 rounded-lg hover:bg-gray-700 transition-colors">
                                    <i class="fab fa-hackerrank text-xl mr-2"></i>
                                    <span>HackerRank</span>
                                </a>
                                <a href="https://leetcode.com/u/praneethkumar_/" target="_blank"
                                    class="flex items-center p-3 bg-gray-800 rounded-lg hover:bg-gray-700 transition-colors">
                                    <i class="fas fa-code text-xl mr-2"></i>
                                    <span>LeetCode</span>
                                </a>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="https://unpkg.com/aos@next/dist/aos.js"></script>
    <script src="script.js"></script>
</body>
</html>
